services:
  - type: web
    name: mirror-muse
    env: node
    plan: free
    buildCommand: echo "No build step required"
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: IMAGE_PROVIDER
        value: openai-compatible-relay
      - key: IMAGE_BASE_URL
        value: https://gpt.fengxiaole.top/v1
      - key: IMAGE_API_MODE
        value: responses
      - key: IMAGE_RESPONSE_PATH
        value: /responses
      - key: IMAGE_PATH
        value: /images/edits
      - key: IMAGE_MODEL
        value: gpt-5.4
      - key: IMAGE_EDIT_MODEL
        value: gpt-image-1
      - key: IMAGE_OUTPUT_SIZE
        value: 1024x1536
      - key: IMAGE_OUTPUT_QUALITY
        value: high
      - key: IMAGE_API_KEY
        sync: false
      - key: ACCESS_CODE_PROOF
        value: 6a2004e012c5c953d4d6fc8c094394fd46b1bc59aec81857e77b4d8cb3d8aea9
      - key: ACCESS_CODE_HMAC_SECRET
        sync: false
      - key: ACCESS_SESSION_SECRET
        sync: false
