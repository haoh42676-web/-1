services:
  - type: web
    name: mirror-muse
    env: node
    plan: free
    buildCommand: echo "No build step required"
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DEFAULT_IMAGE_PROVIDER
        value: relay
      - key: IMAGE_PROVIDER
        value: openai-compatible-relay
      - key: IMAGE_BASE_URL
        value: https://gpt.fengxiaole.top/v1
      - key: IMAGE_API_MODE
        value: responses
      - key: IMAGE_RESPONSE_PATH
        value: /responses
      - key: IMAGE_PATH
        value: /images/edits
      - key: IMAGE_MODEL
        value: gpt-5.4
      - key: IMAGE_EDIT_MODEL
        value: gpt-image-1
      - key: IMAGE_OUTPUT_SIZE
        value: 1024x1536
      - key: IMAGE_OUTPUT_QUALITY
        value: high
      - key: IMAGE_API_KEY
        sync: false
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com
      - key: GEMINI_API_VERSION
        value: v1beta
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: GEMINI_IMAGE_ASPECT_RATIO
        value: 3:4
      - key: GEMINI_IMAGE_SIZE
        value: 1K
      - key: GEMINI_API_KEY
        sync: false
